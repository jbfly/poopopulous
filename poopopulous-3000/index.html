<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poopopulous 3000</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💩</text></svg>" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1423;
      font-family: 'Trebuchet MS', Verdana, sans-serif;
      user-select: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }
    #hud h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 2px;
      color: #ffd24a;
    }
    #hud h1 small { color: #fff; font-size: 12px; letter-spacing: 1px; }
    #counter { font-size: 14px; margin-bottom: 10px; }
    .btn {
      display: block;
      margin: 6px 0;
      padding: 8px 14px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      background: #5d4037;
      border: 2px solid #8d6e63;
      border-radius: 8px;
      cursor: pointer;
      min-width: 190px;
      text-align: left;
    }
    .btn:hover { background: #6d4c41; }
    .btn.active { background: #a1887f; border-color: #ffd24a; }

    #zoom {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #zoom .btn { min-width: 0; font-size: 22px; line-height: 1; padding: 6px 14px; text-align: center; }

    #karaoke {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 7%;
      z-index: 10;
      text-align: center;
      pointer-events: none;
      display: none;
    }
    #karaoke .line {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 6px #000, 0 2px 2px #000;
      min-height: 40px;
    }
    #karaoke .line .sung { color: #ffd24a; }
    #karaoke .next {
      font-size: 18px;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 1px 2px #000;
      min-height: 24px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <h1>POOPOPULOUS 3000 <small>est. 2023</small></h1>
    <div id="counter">💩 × 0</div>
    <button id="unleashBtn" class="btn">🌊 Unleash the Poos!</button>
    <button id="karaokeBtn" class="btn">🎤 Karaoke Mode</button>
    <button id="muteBtn" class="btn">🔊 Sound On</button>
  </div>

  <div id="zoom">
    <button id="zoomInButton" class="btn">+</button>
    <button id="zoomOutButton" class="btn">−</button>
  </div>

  <div id="karaoke">
    <div class="line" id="karaokeLine"></div>
    <div class="next" id="karaokeNext"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
